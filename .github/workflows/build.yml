name: Build NetCheck Pro EXE

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # Permite ejecutar manualmente desde GitHub

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Compilar NetCheckPro.exe
        run: |
          cd src
          pyinstaller `
            --onefile `
            --windowed `
            --name "NetCheckPro" `
            --uac-admin `
            --add-data "core;core" `
            --add-data "gui;gui" `
            --hidden-import tkinter `
            --hidden-import tkinter.ttk `
            --hidden-import tkinter.messagebox `
            --hidden-import core.network `
            --hidden-import core.analyzer `
            --hidden-import core.correlator `
            --hidden-import core.profiler `
            --hidden-import gui.main_window_tk `
            entry.py

      - name: Verificar que el .exe existe
        run: |
          if (Test-Path "src/dist/NetCheckPro.exe") {
            $size = (Get-Item "src/dist/NetCheckPro.exe").length / 1MB
            Write-Host "NetCheckPro.exe generado correctamente: $([math]::Round($size,1)) MB"
          } else {
            Write-Host "ERROR: El .exe no fue generado"
            exit 1
          }

      # Subir .exe como artifact descargable en cada build
      - name: Subir artifact (build normal)
        uses: actions/upload-artifact@v4
        with:
          name: NetCheckPro-Windows-x64
          path: src/dist/NetCheckPro.exe
          retention-days: 30

      # Crear Release oficial cuando se hace push de un tag v*
      - name: Crear Release en GitHub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: NetCheck Pro ${{ github.ref_name }}
          body: |
            ## NetCheck Pro ${{ github.ref_name }}
            
            ### Descarga
            Descarga `NetCheckPro.exe` y ejecútalo directamente.
            No requiere instalación ni dependencias.
            
            ### Requisitos
            - Windows 10 / 11
            - Ejecutar como Administrador (lo solicita automáticamente)
            
            ### Cambios
            Ver [CHANGELOG.md](CHANGELOG.md)
          files: src/dist/NetCheckPro.exe
          draft: false
          prerelease: false
