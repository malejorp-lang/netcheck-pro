name: Build NetCheck Pro EXE

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Compilar NetCheckPro.exe
        run: |
          cd src
          pyinstaller `
            --onefile `
            --windowed `
            --name "NetCheckPro" `
            --uac-admin `
            --paths "." `
            --add-data "core;core" `
            --add-data "gui;gui" `
            --hidden-import tkinter `
            --hidden-import tkinter.ttk `
            --hidden-import tkinter.messagebox `
            --hidden-import threading `
            --hidden-import subprocess `
            --hidden-import socket `
            --hidden-import statistics `
            --hidden-import concurrent.futures `
            --hidden-import core `
            --hidden-import core.network `
            --hidden-import core.analyzer `
            --hidden-import core.correlator `
            --hidden-import core.profiler `
            --hidden-import gui `
            --hidden-import gui.main_window_tk `
            --collect-all tkinter `
            entry.py

      - name: Verificar exe
        run: |
          if (Test-Path "src/dist/NetCheckPro.exe") {
            $size = (Get-Item "src/dist/NetCheckPro.exe").length / 1MB
            Write-Host "OK: NetCheckPro.exe generado - $([math]::Round($size,1)) MB"
          } else {
            Write-Host "ERROR: exe no generado"
            exit 1
          }

      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetCheckPro-Windows-x64
          path: src/dist/NetCheckPro.exe
          retention-days: 30

      - name: Crear Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: NetCheck Pro ${{ github.ref_name }}
          body: |
            ## NetCheck Pro ${{ github.ref_name }}
            Descarga NetCheckPro.exe y ejecuta directamente.
            No requiere instalacion ni Python.
          files: src/dist/NetCheckPro.exe
